<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>WC OPW HCM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div class="container">
      <div
        id="g_id_onload"
        data-client_id="897420109757-78vojcfni05vvo7e8ct38d8l625r3je0.apps.googleusercontent.com"
        data-callback="handleCredentialResponse"
      ></div>
      <div id="loginSection" class="g_id_signin"></div>

      <div id="userInfo" style="display: none"></div>

      <div id="tabContainer" class="tab-container" style="display: none">
        <button id="btnActiveMatches" class="tab-btn active" onclick="switchTab('active')">
          Trận sắp đá
        </button>
        <button id="btnPastMatches" class="tab-btn" onclick="switchTab('past')">
          Lịch sử (Chỉ xem)
        </button>
        <button id="btnLeaderboard" class="tab-btn" onclick="switchTab('leaderboard')">
          🏆 Bảng vàng
        </button>
      </div>

      <table id="mainTable" style="display: none">
        <thead>
          <tr>
            <th>STT</th>
            <th>Thời gian</th>
            <th>Trận đấu</th>
            <th>Cửa trên</th>
            <th>Chấp</th>
            <th>Cửa trên</th>
            <th>Cửa dưới</th>
          </tr>
        </thead>
        <tbody id="matchBody"></tbody>
      </table>
      <table id="leaderboardTable" style="display: none">
        <thead>
          <tr class="rank-header">
            <th>Hạng</th>
            <th>Thành viên</th>
            <th>Tổng điểm</th>
            <th>Trận đúng</th>
            <th>Trận sai</th>
            <th>Tỷ lệ thắng</th>
            <th>Chuỗi thắng Max</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
    </div>
    <div id="toast"></div>

    <script src="script.js"></script>
  </body>
</html>
